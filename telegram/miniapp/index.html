<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tartarus Protocol - Mini App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #0a0a0a;
      color: #2aef2a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    #app {
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding: 12px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 12px 0;
      border-bottom: 1px solid #2aef2a33;
    }
    .header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .subheader {
      margin-top: 4px;
      font-size: 0.75rem;
      color: #2aef2a88;
    }

    /* Status card */
    .status-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
      padding: 12px;
      background: #111;
      border: 1px solid #2aef2a22;
      border-radius: 4px;
    }
    .status-item {
      font-size: 0.7rem;
      color: #2aef2a99;
    }
    .status-value {
      font-size: 0.85rem;
      color: #2aef2a;
      margin-top: 2px;
    }
    .status-value.threat { color: #ef2a2a; }

    /* Log panel */
    .log-panel {
      flex: 1;
      min-height: 140px;
      max-height: 180px;
      overflow-y: auto;
      padding: 12px;
      margin: 12px 0;
      background: #0d0d0d;
      border: 1px solid #2aef2a22;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .log-entry {
      margin-bottom: 6px;
      padding-left: 8px;
      border-left: 2px solid #2aef2a44;
    }
    .log-entry.error { border-color: #ef2a2a44; }

    /* Action buttons */
    .action-panel {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .action-btn {
      padding: 12px;
      background: #111;
      border: 1px solid #2aef2a55;
      border-radius: 4px;
      color: #2aef2a;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { background: #1a2a1a; }
    @media (max-width: 360px) {
      .action-panel { grid-template-columns: 1fr; }
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      padding-bottom: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 12px;
      background: #111;
      border: 1px solid #2aef2a55;
      border-radius: 4px;
      color: #2aef2a;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .input-area input::placeholder { color: #2aef2a44; }
    .input-area button {
      padding: 14px 18px;
      background: #1a3a1a;
      border: 1px solid #2aef2a;
      border-radius: 4px;
      color: #2aef2a;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .input-area button:active { background: #2a4a2a; }

    /* Episode lock section */
    .episode-section {
      padding: 12px;
      margin-top: auto;
      background: #0d0d0d;
      border: 1px solid #2aef2a22;
      border-radius: 4px;
    }
    .episode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 0.85rem;
    }
    .episode-row.locked { color: #666; opacity: 0.8; }
    .episode-row.available { color: #2aef2a; }
    .episode-unlock-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: #1a1a1a;
      border: 1px dashed #2aef2a55;
      border-radius: 4px;
      color: #2aef2a99;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .episode-unlock-btn:active { background: #222; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Tartarus Protocol</h1>
      <p class="subheader">Telegram Mini App Prototype</p>
    </header>

    <section class="status-card">
      <div class="status-item">
        Match ID
        <div class="status-value" id="status-match-id">match_dummy_001</div>
      </div>
      <div class="status-item">
        Remaining Time
        <div class="status-value" id="status-time">6:42</div>
      </div>
      <div class="status-item">
        Current Location
        <div class="status-value" id="status-location">Bridge</div>
      </div>
      <div class="status-item">
        Threat Level
        <div class="status-value threat" id="status-threat">ELEVATED</div>
      </div>
    </section>

    <section class="log-panel" id="log-panel">
      <div class="log-entry" id="log-init">[--] Connecting...</div>
    </section>

    <section class="action-panel">
      <button class="action-btn" data-action="question">승무원 심문</button>
      <button class="action-btn" data-action="cctv">CCTV 로그 확인</button>
      <button class="action-btn" data-action="engine">엔진실 확인</button>
      <button class="action-btn" data-action="pistol">권총 획득</button>
      <button class="action-btn" data-action="threat">위협</button>
      <button class="action-btn" data-action="clue">단서 수집</button>
      <button class="action-btn" data-action="execute" style="grid-column: 1 / -1;">처형 프로토콜 실행</button>
    </section>

    <section class="input-area">
      <input type="text" id="free-input" placeholder="자유 입력..." maxlength="200" />
      <button type="button" id="send-btn">전송</button>
    </section>

    <section class="episode-section">
      <div class="episode-row available">Episode 1: Free / Available</div>
      <div class="episode-row locked">Episode 2: Locked</div>
      <div class="episode-row locked">Episode 3: Locked</div>
      <button class="episode-unlock-btn" id="episode-unlock-btn">Unlock Episode Pass</button>
    </section>
  </div>

  <script>
    (function() {
      var API_BASE = (typeof location !== 'undefined' && location.origin === 'http://localhost:8788') ? '' : 'http://localhost:8788';
      const PLAYER_KEY = 'tartarus_miniapp_playerId';

      const statusMatchId = document.getElementById('status-match-id');
      const statusTime = document.getElementById('status-time');
      const statusLocation = document.getElementById('status-location');
      const statusThreat = document.getElementById('status-threat');
      const logPanel = document.getElementById('log-panel');
      const logInit = document.getElementById('log-init');
      const freeInput = document.getElementById('free-input');
      const sendBtn = document.getElementById('send-btn');
      const actionBtns = document.querySelectorAll('.action-btn');
      const episodeUnlockBtn = document.getElementById('episode-unlock-btn');

      function getPlayerId() {
        let id = localStorage.getItem(PLAYER_KEY);
        if (!id) {
          id = 'miniapp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
          localStorage.setItem(PLAYER_KEY, id);
        }
        return id;
      }

      function formatTime(sec) {
        if (sec == null || sec < 0) return '--:--';
        var m = Math.floor(sec / 60);
        var s = Math.floor(sec % 60);
        return m + ':' + String(s).padStart(2, '0');
      }

      function appendLog(text, isError) {
        if (logInit && logInit.parentNode) logInit.remove();
        const entry = document.createElement('div');
        entry.className = 'log-entry' + (isError ? ' error' : '');
        var ts = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        entry.textContent = '[' + ts + '] ' + text;
        logPanel.appendChild(entry);
        logPanel.scrollTop = logPanel.scrollHeight;
      }

      function updateStatus(state) {
        if (!state) return;
        if (state.match_id) statusMatchId.textContent = state.match_id;
        statusTime.textContent = formatTime(state.remaining_sec);
        statusLocation.textContent = state.location || 'Bridge';
        var gs = state.game_state || {};
        if (gs.game_over && gs.outcome) {
          statusThreat.textContent = 'GAME OVER';
          statusThreat.classList.add('threat');
        } else {
          statusThreat.textContent = (gs.dead_roles && gs.dead_roles.length > 0) ? 'ELEVATED' : 'NOMINAL';
        }
      }

      function applyEvents(events) {
        if (!events || !events.length) return;
        events.forEach(function(ev) {
          var label = (ev.type || ev.role) + (ev.target ? ' -> ' + ev.target : '');
          appendLog(label, false);
        });
      }

      function doStart() {
        var playerId = getPlayerId();
        fetch(API_BASE + '/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId: playerId })
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok) {
              updateStatus({ match_id: data.match_id, remaining_sec: data.remaining_sec, game_state: data.game_state });
              if (data.events && data.events.length) applyEvents(data.events);
              else appendLog('System: Tartarus Protocol initialized.', false);
            } else {
              appendLog('Error: ' + (data.error || 'unknown'), true);
            }
          })
          .catch(function(err) {
            appendLog('Connection failed. Start: node telegram/bot/bot.js', true);
          });
      }

      function doMessage(text) {
        var playerId = getPlayerId();
        fetch(API_BASE + '/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId: playerId, text: text })
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.ok) {
              updateStatus({ remaining_sec: data.remaining_sec, game_state: data.match_state });
              appendLog(data.summary || 'Captain acted.', false);
              if (data.recent_events && data.recent_events.length) applyEvents(data.recent_events);
            } else {
              appendLog('Error: ' + (data.error || 'unknown'), true);
            }
          })
          .catch(function(err) {
            appendLog('Connection failed: ' + err.message, true);
          });
      }

      doStart();

      sendBtn.addEventListener('click', function() {
        var text = (freeInput.value || '').trim();
        if (!text) return;
        doMessage(text);
        freeInput.value = '';
      });

      freeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendBtn.click();
      });

      actionBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var action = this.dataset.action || '';
          if (action === 'question') {
            doMessage('네비게이터 어디 있었어');
          } else if (action === 'cctv') {
            doMessage('로그 보여줘');
          } else {
            console.log('[Tartarus MiniApp] action:', action);
          }
        });
      });

      episodeUnlockBtn.addEventListener('click', function() {
        console.log('[Tartarus MiniApp] Unlock Episode Pass (placeholder)');
      });
    })();
  </script>
</body>
</html>
